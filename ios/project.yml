name: GymBro
options:
  bundleIdPrefix: com.gymbro
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

packages:
  MWDATCore:
    url: https://github.com/facebook/meta-wearables-dat-ios
    exactVersion: 0.4.0
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: 2.0.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""

configs:
  Debug: debug
  Release: release

targets:
  GymBro:
    type: application
    platform: iOS
    sources:
      - GymBro
    settings:
      base:
        INFOPLIST_FILE: GymBro/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.gymbro.ios
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: MWDATCore
        product: MWDATCore
      - package: MWDATCore
        product: MWDATCamera
      - package: MWDATCore
        product: MWDATMockDevice
      - package: Supabase
        product: Supabase

  GymBroTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GymBroTests
    dependencies:
      - target: GymBro
